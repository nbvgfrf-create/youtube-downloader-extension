<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube Downloader Helper</title>
  <link rel="stylesheet" href="/assets/settings.css">
</head>
<body>
  <div id="toast" class="toast" hidden></div>

  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Local Helper</p>
      <h1>YouTube Downloader</h1>
      <p id="heroSubtitle" class="subtitle"></p>
    </section>

    <section class="card">
      <div class="card-head">
        <div>
          <h2 id="healthTitle"></h2>
          <p id="healthSubtitle" class="subhead"></p>
        </div>
        <button id="refreshButton" class="ghost" type="button"></button>
      </div>
      <div id="health" class="health-grid"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <div>
          <h2 id="settingsTitle"></h2>
          <p id="settingsSubtitle" class="subhead"></p>
        </div>
        <span id="status" class="status"></span>
      </div>

      <form id="settingsForm" class="settings-form">
        <div class="split">
          <label>
            <span id="languageLabel"></span>
            <select id="language" name="language"></select>
            <small id="languageHelp"></small>
          </label>

          <label>
            <span id="saveDirectoryLabel"></span>
            <input id="saveDirectory" name="save_directory" type="text" placeholder="C:\Users\...\Downloads\YouTube Downloader">
            <small id="saveDirectoryHelp"></small>
          </label>
        </div>

        <div class="split">
          <label>
            <span id="defaultModeLabel"></span>
            <select id="defaultMode" name="default_mode">
              <option value="best" data-i18n="default_mode_best"></option>
              <option value="video" data-i18n="default_mode_video"></option>
              <option value="audio" data-i18n="default_mode_audio"></option>
            </select>
            <small id="defaultModeHelp"></small>
          </label>

          <label>
            <span id="preferredAudioFormatLabel"></span>
            <select id="preferredAudioFormat" name="preferred_audio_format">
              <option value="mp3">MP3</option>
              <option value="m4a">M4A</option>
              <option value="opus">Opus</option>
            </select>
            <small id="preferredAudioFormatHelp"></small>
          </label>
        </div>

        <label>
          <span id="cookieSourceLabel"></span>
          <select id="cookieSource" name="cookie_source">
            <option value="auto" data-i18n="cookie_source_auto"></option>
            <option value="browser" data-i18n="cookie_source_browser"></option>
            <option value="file" data-i18n="cookie_source_file"></option>
            <option value="none" data-i18n="cookie_source_none"></option>
          </select>
          <small id="cookieSourceHelp"></small>
        </label>

        <div id="browserCookieFields" class="split">
          <label>
            <span id="cookieBrowserLabel"></span>
            <select id="cookieBrowser" name="cookie_browser">
              <option value="edge">Microsoft Edge</option>
              <option value="chrome">Google Chrome</option>
              <option value="firefox">Firefox</option>
              <option value="brave">Brave</option>
              <option value="opera">Opera</option>
              <option value="chromium">Chromium</option>
              <option value="vivaldi">Vivaldi</option>
            </select>
            <small id="cookieBrowserHelp"></small>
          </label>

          <label>
            <span id="cookieBrowserProfileLabel"></span>
            <input id="cookieBrowserProfile" name="cookie_browser_profile" type="text" placeholder="Default">
            <small id="cookieBrowserProfileHelp"></small>
          </label>
        </div>

        <label id="cookieFileField">
          <span id="cookieFilePathLabel"></span>
          <input id="cookieFilePath" name="cookie_file_path" type="text" placeholder="C:\Users\...\cookies.txt">
          <small id="cookieFilePathHelp"></small>
        </label>

        <div class="note">
          <strong id="ffmpegTitle"></strong>
          <span id="ffmpegHelp"></span>
        </div>

        <label class="checkbox">
          <input id="launchAtStartup" name="launch_at_startup" type="checkbox">
          <span id="launchAtStartupLabel"></span>
        </label>
        <p id="launchAtStartupHelp" class="field-note"></p>

        <label class="checkbox">
          <input id="minimizeToTray" name="minimize_to_tray" type="checkbox">
          <span id="minimizeToTrayLabel"></span>
        </label>
        <p id="minimizeToTrayHelp" class="field-note"></p>

        <label class="checkbox">
          <input id="closeToTray" name="close_to_tray" type="checkbox">
          <span id="closeToTrayLabel"></span>
        </label>
        <p id="closeToTrayHelp" class="field-note"></p>

        <label class="checkbox">
          <input id="showCompletionNotifications" name="show_completion_notifications" type="checkbox">
          <span id="showCompletionNotificationsLabel"></span>
        </label>
        <p id="showCompletionNotificationsHelp" class="field-note"></p>

        <div class="actions">
          <button id="saveButton" type="submit" class="primary"></button>
          <button type="button" id="openDownloadsButton" class="ghost"></button>
          <button type="button" id="openLogsButton" class="ghost"></button>
        </div>
      </form>
    </section>
  </main>

  <script src="/assets/settings-i18n.js"></script>
  <script src="/assets/settings.js"></script>
</body>
</html>
