name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install helper dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r app/helper/requirements.txt

      - name: Compile helper
        run: python -m compileall app/helper/yt_helper

      - name: Validate extension scripts
        run: |
          node --check extension/background.js
          node --check extension/content.js
          node --check extension/popup.js
